# Example nav2 controller_server configuration using MppiController.
# Drop-in replacement slot for nav2_mppi_controller / DWB in your nav2 params.
controller_server:
  ros__parameters:
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "mppi_controller::MppiController"
      batch_size: 2048          # sampled trajectories per cycle (1 GPU thread each)
      time_steps: 56            # horizon length
      model_dt: 0.05            # [s]
      iteration_count: 1
      motion_model: "DiffDrive" # DiffDrive / Ackermann / Omni
      v_max: 0.5                # [m/s]
      v_min: -0.35              # [m/s]
      vy_max: 0.5               # [m/s] (Omni)
      w_max: 1.9                # [rad/s]
      min_turning_r: 0.2        # [m] (Ackermann)
      v_std: 0.2
      vy_std: 0.2               # (Omni)
      w_std: 0.4
      consider_footprint: false # polygon footprint check (needs inflation layer)
      enable_retreat: true       # recover by backing out from last valid sequence
      retreat_scale: 0.5         # fraction of last valid controls to reverse
      temperature: 0.12         # MPPI softmin lambda
      goal_weight: 20.0         # terminal local-goal distance (linear)
      goal_yaw_weight: 3.0
      path_weight: 10.0         # lateral deviation^2 from the plan
      path_follow_weight: 5.0   # pull toward a point ahead on the plan
      path_angle_weight: 0.25    # align rollout heading with the local path tangent
      curvature_speed_weight: 0.0 # optional: slow only when the followed path bends sharply
      curvature_speed_min: 0.18   # [m/s] speed floor for curvature-limited targets
      follow_lookahead: 1.0     # [m]
      costmap_weight: 3.0
      distance_field_weight: 0.0 # optional ESDF-style clearance critic
      distance_field_cutoff: 0.75 # [m] no clearance penalty beyond this
      smoothness_weight: 0.2
      backward_weight: 0.5
      speed_weight: 3.0         # penalty on (v_max - v): cruise at the limit
      angular_weight: 0.5       # penalty on wz^2: damps heading random walk
      yaw_goal_activation_dist: 0.5
      lookahead_dist: 3.0       # [m] global plan window fed to the GPU
      transform_tolerance: 0.1
      diagnostics_log_period: 0.0 # [s] 0 disables periodic solve/valid-rollout logs
      diagnostics_csv_path: ""    # optional CSV trace path for per-cycle diagnostics
